services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: dnvsol
      POSTGRES_PASSWORD: dnvsol
      POSTGRES_DB: dnvsol_dev
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U dnvsol']
      interval: 5s
      timeout: 5s
      retries: 5


volumes:
  pgdata:
